name: Build

# Build-portability check on arm64 Linux. The maintainer develops on
# macOS arm64 (Apple clang); ubuntu-24.04-arm shares the ISA but
# differs in libc (glibc vs Apple libsystem) and OS, which still
# catches case-sensitive include bugs, missing headers, and
# gcc-vs-clang portability regressions. End-to-end runtime
# verification stays in Scripts/check.sh, run locally on macOS.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  # Opt in to Node 24 now so the runner doesn't print a Node-20
  # deprecation warning for actions/checkout@v4 etc. Node 24 becomes
  # the default after 2026-06-02 — at that point this env can be
  # removed.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04-arm]

    steps:
      - name: Checkout (full history for getVersion.pl)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Toolchain identification
        run: |
          uname -a
          $(command -v cc || echo cc) --version || true
          gcc --version || true
          make --version | head -1
          perl -v | head -2

      - name: Build all 18 host tools
        run: make -C Linux

      - name: Verify Linux/Install/ contents
        run: |
          set -e
          missing=0
          for t in cgen cpp cref dehuff dump enhuff hidump hidump2 \
                   libr libr4 link mkpat objtohex optim p1 zas zas4 zc; do
              if [ ! -x "Linux/Install/$t" ]; then
                  echo "MISSING: $t"
                  missing=$((missing + 1))
              fi
          done
          [ "$missing" = 0 ] || { echo "$missing tools missing"; exit 1; }
          echo "All 18 tools present."

      - name: Version smoke test on a sample of tools
        run: |
          for t in zc cpp p1 cgen zas; do
              echo "--- $t -V ---"
              "./Linux/Install/$t" -V | head -5
          done
