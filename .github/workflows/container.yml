name: Container

# Builds the host toolchain into a Docker image and publishes it to
# GitHub Container Registry as ghcr.io/${{ github.repository }}.
# Tags published per push to main:
#   :latest                    rolling latest-main
#   :sha-<short>               immutable per-commit
# Run with:
#   docker run --rm -v "$PWD:/work" ghcr.io/ravn/hitech:latest zc hello.c
# (built artefacts land in $PWD)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout (full history for getVersion.pl)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          repo_lc=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          short=${GITHUB_SHA:0:7}
          echo "tags=ghcr.io/$repo_lc:latest,ghcr.io/$repo_lc:sha-$short" >> "$GITHUB_OUTPUT"

      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # Use GitHub Actions cache for faster rebuilds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
