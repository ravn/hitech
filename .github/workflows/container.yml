name: Container

# Builds the host toolchain into a Docker image and publishes it to
# GitHub Container Registry as ghcr.io/${{ github.repository }}.
# Tags published per push to main:
#   :latest                    rolling latest-main
#   :sha-<short>               immutable per-commit
# Run with:
#   docker run --rm -v "$PWD:/work" ghcr.io/ravn/hitech:latest zc hello.c
# (built artefacts land in $PWD)

on:
  push:
    branches: [main]
  workflow_dispatch:


jobs:
  image:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout (full history for getVersion.pl)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          repo_lc=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          short=${GITHUB_SHA:0:7}
          echo "tags=ghcr.io/$repo_lc:latest,ghcr.io/$repo_lc:sha-$short" >> "$GITHUB_OUTPUT"

      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # Use GitHub Actions cache for faster rebuilds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    # Pulls the just-published hitech image and the runcpm image, then
    # runs the full integration suite from tests/ — six tests covering
    # the printf format spec, string.h, integer arithmetic, multi-source
    # linking, and a negative compile-failure test. Each test compiles
    # via `docker run hitech zc <file>` and executes via
    # `docker run runcpm <com>`, so this job exercises the published
    # images, not the runner's gcc-built binaries.
    needs: image
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout (need tests/ sources and Makefile)
        uses: actions/checkout@v6

      - name: Log in to GHCR (read)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image refs
        id: refs
        run: |
          repo_lc=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          short=${GITHUB_SHA:0:7}
          echo "hitech=ghcr.io/$repo_lc:sha-$short" >> "$GITHUB_OUTPUT"
          echo "runcpm=ghcr.io/$repo_lc:runcpm-latest" >> "$GITHUB_OUTPUT"

      - name: Pull both images
        run: |
          docker pull ${{ steps.refs.outputs.hitech }}
          docker pull ${{ steps.refs.outputs.runcpm }}

      - name: Run integration suite via published images
        # The tests/Makefile takes ZC and RUNCPM_IMG as overrides; here
        # we point ZC at a docker-run wrapper for the SHA-tagged hitech
        # image and RUNCPM_IMG at the runcpm tag.
        working-directory: tests
        run: |
          make check \
              ZC="docker run --rm -v $PWD:/work -w /work --entrypoint /opt/hitech/bin/zc ${{ steps.refs.outputs.hitech }}" \
              RUNCPM_IMG=${{ steps.refs.outputs.runcpm }}
